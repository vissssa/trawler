apiVersion: apps/v1
kind: Deployment
metadata:
  name: trawler-sample-site
  labels:
    app: trawler
    component: sample-site
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trawler
      component: sample-site
  template:
    metadata:
      labels:
        app: trawler
        component: sample-site
    spec:
      securityContext:
        runAsUser: 601
        runAsGroup: 601
        runAsNonRoot: true
      containers:
        - name: sample-site
          image: trawler:latest
          command: ["node", "sample-site/app.js"]
          ports:
            - containerPort: 3001
              name: http
          env:
            - name: PORT
              value: "3001"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: trawler-sample-site
  labels:
    app: trawler
    component: sample-site
spec:
  type: ClusterIP
  selector:
    app: trawler
    component: sample-site
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
